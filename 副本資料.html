<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWMMO Wiki - 副本資料</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Microsoft JhengHei",sans-serif;
        }

        body{
            background:#111827;
            color:white;
        }

        header{
            background:#1f2937;
            padding:20px;
            text-align:center;
            border-bottom:3px solid #3b82f6;
        }

        header a{
            color:#60a5fa;
            text-decoration:none;
        }

        .container{
            width:90%;
            max-width:1200px;
            margin:auto;
            padding:30px 0;
        }

        .title{
            margin-bottom:25px;
        }

        .title h1{
            margin-bottom:10px;
        }

        .dungeon-card{
            background:#1f2937;
            border-radius:12px;
            padding:25px;
            margin-bottom:25px;
            border-left:5px solid #3b82f6;
        }

        .dungeon-card h2{
            margin-bottom:15px;
        }

        .info{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:10px;
            margin-bottom:20px;
        }

        .info div{
            background:#111827;
            padding:10px;
            border-radius:8px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
        }

        th,td{
            border:1px solid #374151;
            padding:12px;
            text-align:center;
        }

        th{
            background:#2563eb;
        }

        tr:nth-child(even){
            background:#111827;
        }

        .drops{
            margin-top:20px;
        }

        footer{
            text-align:center;
            padding:20px;
            background:#1f2937;
            margin-top:30px;
            color:#9ca3af;
        }
    </style>
</head>

<footer>

</html>
